<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> FinTrack Pro Project-Register</title>
    <link rel="stylesheet" href="resstyle.css">
</head>
<body>
    <main>
        <section class="res-form" id="Register-form">
            <div class="resbox">
                <h2>Create Account</h2>
                <p>Join FinTrack Pro</p>
                <br>
                
                <form action="">
                    <div class="input-group">
                    <label for="username">Choose a Username</label> <br>
                    <input type="text" name="username" required  id="res-use">
                </div>

                <div class="input-group">
                    <br>
                    <label for="password">Password</label> <br> 
                    <input type="password" name="password" required id="res-pass">
                </div>

                <div class="login-btn">
                    <button type="submit">Register</button>
                </div>
                </form>

                <p class="login-here"> Have an account?<a href="./login.html">Login here</a></p>
            </div>
        </section>
    </main>
    <script src="./resscript.js"></script>
</body>
</html>
