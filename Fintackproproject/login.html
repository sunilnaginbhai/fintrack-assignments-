<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack Pro Project</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <main>
        <section class="login-form">
            <div class="loginbox">
                <h2>Welcome Back</h2>
                <p>Login to FinTrack Pro</p>
                
                <form action="/login" method="POST" class="form">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" name="username" id="log-use" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" name="password" id="log-pass" required>
                    </div>

                    <div class="login-btn">
                        <button type="submit">Login</button>
                    </div>
                </form>

                <p class="register-here">Don't have an account? <a href="./index.html">Register here</a></p>
            </div>
        </section>
    </main>
    <script src="login.js"></script>
</body>
</html>
