<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> FinTrack Pro Project</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <main>
        <section class="login-form">
            <div class="loginbox">
                <h2>Welcome Back</h2>
                <p>Login to FinTrack Pro</p>
                <br>
                
                <form action="" class="login-form">
                    <div class="input-group">
                    <label for="username">Username</label> <br>
                    <input type="text" name="username" required id="log-use">
                </div>

                <div class="input-group">
                    <br>
                    <label for="password">Password</label> <br> 
                    <input type="password" name="password" required id="log-pass">
                </div>

                <div class="login-btn">
                    <button type="submit">Login</button>
                </div>
                </form>

                <p class="Register-here">Don't have an account?<a href="./index.html">Register here</a></p>
            </div>
        </section>
    </main>
    <script src="login.js"></script>
</body>
</html>
